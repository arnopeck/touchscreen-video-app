<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self'; base-uri 'none'; form-action 'none'">
  <meta name="description" content="VideoJukebox - Touchscreen video application for kiosk systems">
  <meta name="theme-color" content="#0a0e13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VideoJukebox</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app" role="application" aria-label="VideoJukebox">

  <!-- Home -->
  <section id="home" class="page" role="main" aria-label="Pagina iniziale">
    <h1>VideoJukebox</h1>
    <div id="categorie" role="navigation" aria-label="Categorie"></div>
  </section>

  <!-- Categoria -->
  <section id="categoria" class="page" role="main" aria-label="Categoria">
    <button class="home-button" aria-label="Torna alla home">Home</button>
    <div id="menuCategorie">
      <select id="selectCategorie" aria-label="Seleziona categoria"></select>
    </div>
    <h2 id="categoriaNome"></h2>
    <p id="categoriaDescrizione"></p>
    <button id="visualizzaProgetti">Visualizza i progetti</button>
  </section>

  <!-- Lista Progetti -->
  <section id="progetti" class="page" role="main" aria-label="Elenco progetti">
    <button class="home-button" aria-label="Torna alla home">Home</button>
    <h2 id="progettiTitolo"></h2>
    <div id="listaProgetti" role="list" aria-label="Progetti"></div>
  </section>

  <!-- Dettaglio Progetto -->
  <section id="progetto" class="page" role="main" aria-label="Dettaglio progetto">
    <div id="paginaContenuti">
      <button class="home-button" aria-label="Torna alla home">Home</button>
      <button id="tornaCategoria" aria-label="Torna alla categoria"></button>

      <div id="navigazioneProgetti" role="navigation" aria-label="Navigazione progetti">
        <button id="prevProgetto" class="naviga" aria-label="Progetto precedente">&lsaquo;</button>
        <button id="nextProgetto" class="naviga" aria-label="Progetto successivo">&rsaquo;</button>
      </div>

      <div id="videoContainer" role="region" aria-label="Video">
        <div id="playButton" aria-hidden="true"></div>
        <video id="progettoVideo" preload="metadata" playsinline muted aria-label="Anteprima video">
          Il tuo browser non supporta il tag video.
        </video>
        <div id="loadingSpinner" role="status" aria-label="Caricamento" aria-hidden="true"></div>
        <div id="videoErrorContainer" role="alert" aria-hidden="true">
          <h3>Errore Video</h3>
          <p class="error-message"></p>
          <button class="retry-button">Riprova</button>
        </div>
      </div>

      <h2 id="progettoTitolo"></h2>
      <h3 id="progettoSottotitolo"></h3>
      <div id="progettoAutori" aria-label="Autori del progetto"></div>
    </div>

    <div id="overlayVideoContainer" role="dialog" aria-label="Video a schermo intero">
      <button id="closeFullscreenButton" aria-label="Chiudi il video">&#10005;</button>
      <video id="overlayVideo" playsinline aria-label="Video del progetto"></video>
    </div>
  </section>

</div>

<!-- Database e applicazione -->
<script src="data/DB.js"></script>
<script src="js/app.js"></script>
</body>
</html>
